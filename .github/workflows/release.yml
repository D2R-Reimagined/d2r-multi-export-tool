name: Release

# Manual release: produces a self-contained, single-file win-x64 zip
# containing the CLI (D2RMultiExport.Console.exe) and GUI
# (D2RMultiExport.Client.exe) side-by-side, plus the bundled Config\
# tree, ready to run on any Windows 10/11 machine without a .NET
# install.
#
# Tag, GitHub release, and release notes (grouped by Conventional
# Commit type) are produced automatically.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without the leading v (e.g. 0.3.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Publish + zip + release
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      ContinuousIntegrationBuild: 'true'
    steps:
      # Mint an installation token from the org-wide D2R-Reimagined GitHub
      # App so tags, pushes, and the Release itself are authored by the
      # org bot (mirroring the sibling `reimagined-launcher` repo). The
      # `D2RR_GH_APP_ID` and `D2RR_GH_APP_PRIVATE_KEY` secrets are managed
      # at the org level and granted to this repo via the App's installed-
      # repositories list.
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.D2RR_GH_APP_ID }}
          private-key: ${{ secrets.D2RR_GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Resolve release version
        id: release_version
        shell: pwsh
        run: |
          $version = '${{ github.event.inputs.version }}'.Trim()
          if ($version.StartsWith('v')) { $version = $version.Substring(1) }
          if ($version -notmatch '^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$') {
            throw "Invalid version format: $version (expected SemVer like 0.3.1 or 0.3.1-rc.1)"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version"    >> $env:GITHUB_OUTPUT

      - name: Set up .NET (pinned to global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore solution
        run: dotnet restore .\D2RMultiExport.sln

      - name: Publish Console (self-contained, single-file, win-x64)
        shell: pwsh
        run: |
          dotnet publish .\D2RMultiExport.Console\D2RMultiExport.Console.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=embedded `
            -p:Version=${{ steps.release_version.outputs.version }} `
            -o "${{ github.workspace }}\artifacts\D2RMultiExport"

      - name: Publish Client (self-contained, single-file, win-x64)
        shell: pwsh
        run: |
          # Avalonia ships native bundles per RID; -p:IncludeNativeLibrariesForSelfExtract=true
          # is required so the single-file exe can extract them at startup.
          dotnet publish .\D2RMultiExport.Client\D2RMultiExport.Client.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=embedded `
            -p:Version=${{ steps.release_version.outputs.version }} `
            -o "${{ github.workspace }}\artifacts\D2RMultiExport"

      - name: Drop GPL license + README into the publish folder
        shell: pwsh
        run: |
          $dest = "${{ github.workspace }}\artifacts\D2RMultiExport"
          Copy-Item -Force .\LICENSE    (Join-Path $dest 'LICENSE.txt')
          Copy-Item -Force .\AUTHORS.md (Join-Path $dest 'AUTHORS.md')
          @"
          D2R Multi-Export Tool ${{ steps.release_version.outputs.tag }}
          ============================================================

          Self-contained win-x64 build. No .NET install required.

          Run the headless exporter:
              D2RMultiExport.Console.exe export --excel <path> --mod-strings <path> --out <out>

          Or launch the GUI:
              D2RMultiExport.Client.exe

          The bundled Config\ folder must remain next to the .exe files.

          Source + docs: https://github.com/D2R-Reimagined/d2r-multi-export-tool
          License: GPL-3.0-or-later (see LICENSE.txt).
          "@ | Set-Content -Path (Join-Path $dest 'README.txt') -Encoding UTF8

      - name: Verify Config\ tree shipped
        shell: pwsh
        run: |
          $dest = "${{ github.workspace }}\artifacts\D2RMultiExport"
          $required = @(
            'D2RMultiExport.Console.exe',
            'D2RMultiExport.Client.exe',
            'Config\export-config.json',
            'Config\synthetic-strings.json',
            'Config\stat-overrides.json',
            'Config\class-ranges.json',
            'Config\CASC_DATA\runes.txt'
          )
          $missing = @()
          foreach ($r in $required) {
            if (-not (Test-Path (Join-Path $dest $r))) { $missing += $r }
          }
          if ($missing.Count -gt 0) {
            throw "Publish output is missing required files:`n$([string]::Join("`n", $missing))"
          }
          Write-Host "All required artifacts present under $dest"

      - name: Create release tag
        shell: pwsh
        run: |
          $tag = '${{ steps.release_version.outputs.tag }}'
          # Identity is cosmetic; the actual auth used by `git push` is the
          # App-installation token persisted by `actions/checkout` above.
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git show-ref --verify --quiet "refs/tags/$tag"
          if ($LASTEXITCODE -eq 0) { throw "Tag $tag already exists" }
          git tag $tag
          git push origin $tag

      - name: Create release zip
        shell: pwsh
        run: |
          $tag = '${{ steps.release_version.outputs.tag }}'
          $zip = "${{ github.workspace }}\artifacts\D2RMultiExport-$tag-win-x64.zip"
          # Archive the parent so the zip's top-level entry is `D2RMultiExport\`.
          Compress-Archive `
            -Path "${{ github.workspace }}\artifacts\D2RMultiExport" `
            -DestinationPath $zip `
            -Force
          $hash = (Get-FileHash -Algorithm SHA256 $zip).Hash
          Write-Host "Zip:    $zip"
          Write-Host "SHA256: $hash"
          "sha256=$hash" >> $env:GITHUB_OUTPUT
        id: zip

      - name: Generate release notes
        id: release_notes
        shell: pwsh
        run: |
          $outputPath = "${{ github.workspace }}\artifacts\release-notes.md"
          ./.github/scripts/Generate-ReleaseNotes.ps1 `
            -CurrentTag '${{ steps.release_version.outputs.tag }}' `
            -OutputPath $outputPath
          $content = Get-Content -Path $outputPath -Raw
          "body<<EOF" >> $env:GITHUB_OUTPUT
          $content    >> $env:GITHUB_OUTPUT
          "EOF"       >> $env:GITHUB_OUTPUT

      - name: Upload publish folder as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: D2RMultiExport-${{ steps.release_version.outputs.tag }}-win-x64
          path: ${{ github.workspace }}\artifacts\D2RMultiExport

      - name: Create GitHub Release + attach zip
        uses: softprops/action-gh-release@v2
        with:
          token:    ${{ steps.app_token.outputs.token }}
          tag_name: ${{ steps.release_version.outputs.tag }}
          name:     ${{ steps.release_version.outputs.tag }}
          body:     ${{ steps.release_notes.outputs.body }}
          files:    ${{ github.workspace }}\artifacts\D2RMultiExport-${{ steps.release_version.outputs.tag }}-win-x64.zip
