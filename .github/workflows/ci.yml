name: Build Check

on:
  # Manual-only: this workflow is intentionally NOT triggered on
  # `pull_request` or `push` to avoid burning Actions minutes on every
  # commit to an open PR (a Windows build runs ~3–4 min). Run it on
  # demand from **Actions → Build Check → Run workflow** before merging.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-check
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      ContinuousIntegrationBuild: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET (pinned to global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore .\D2RMultiExport.sln

      - name: Build (Release)
        run: dotnet build .\D2RMultiExport.sln -c Release --no-restore -p:TreatWarningsAsErrors=false

      # No automated test project exists today (see docs\TESTING.md).
      # Add `dotnet test` here once one is added.
