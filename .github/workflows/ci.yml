name: Build Check

on:
  # PR-only: post-squash `main` rebuilds the same tree the PR head already
  # validated, so the `push: main` trigger is intentionally omitted.
  # Draft PRs are skipped (no `ready_for_review` would fire CI; the
  # job-level `if:` below also gates `synchronize`/`opened`/`reopened`
  # while the PR is still a draft) to avoid ~3 min Windows runs on WIP
  # pushes — promoting a draft fires CI exactly once.
  pull_request:
    branches: [ main ]
    types: [ opened, reopened, synchronize, ready_for_review ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-check
    # Skip draft PRs; mirrors the trigger-types filter above.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      ContinuousIntegrationBuild: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET (pinned to global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore .\D2RMultiExport.sln

      - name: Build (Release)
        run: dotnet build .\D2RMultiExport.sln -c Release --no-restore -p:TreatWarningsAsErrors=false

      # No automated test project exists today (see docs\TESTING.md).
      # Add `dotnet test` here once one is added.
