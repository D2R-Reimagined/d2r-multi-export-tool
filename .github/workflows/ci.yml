name: Build Check

on:
  # Run on PRs against main only — once a PR's CI is green and it gets
  # squash-merged, re-running the exact same build on the resulting `main`
  # commit adds nothing (the tree was already validated on the PR head),
  # so the redundant `push: main` trigger is intentionally omitted.
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-check
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      ContinuousIntegrationBuild: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (pinned to global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore .\D2RMultiExport.sln

      - name: Build (Release)
        run: dotnet build .\D2RMultiExport.sln -c Release --no-restore -p:TreatWarningsAsErrors=false

      # No automated test project exists today (see docs\TESTING.md).
      # Add `dotnet test` here once one is added.
