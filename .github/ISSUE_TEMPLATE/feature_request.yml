name: Feature request
description: Propose a change that adds, removes, or reshapes the exporter's output, CLI, GUI, or config.
title: "feat: <short, lowercase summary of the proposal>"
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please check the project scope.

        `d2r-multi-export-tool` is a **purpose-built** exporter for the
        downstream [D2R Reimagined website](https://github.com/D2R-Reimagined).
        Its `keyed/*.json` schema, CLI flags, and config shape exist to
        serve that one consumer. Requests that broaden the tool into a
        general-purpose D2R data dumper are out of scope and will likely
        be declined — see [`CONTRIBUTING.md`](../../CONTRIBUTING.md) →
        *Project scope*.

        If your idea is a discussion rather than a concrete proposal,
        please open a [GitHub Discussion](https://github.com/D2R-Reimagined/d2r-multi-export-tool/discussions) first.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What's missing, painful, or impossible today? Who is affected (the website, the mod team, contributors, end users)?
      placeholder: The website needs <X>, currently the bundle exposes <Y> which forces the client to <Z>.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: |
        Describe the change concretely. If it affects the wire format,
        sketch the JSON shape. If it affects the CLI, sketch the flag.
        If it affects config, sketch the new config key (and where it
        belongs in `D2RMultiExport.Lib/Config/`).
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this touch?
      multiple: true
      options:
        - Wire format under `<out>/keyed/*.json` (DTOs in `Models/ExportModels.cs` + `Exporters/KeyedJsonExporter.cs`)
        - Language bundles under `<out>/strings/<lang>.json`
        - `manifest.json`
        - CLI flags / `D2RMultiExport.Console`
        - GUI / `D2RMultiExport.Client`
        - Config schema (`D2RMultiExport.Lib/Config/*.json`)
        - Synthetic strings (`synthetic-strings.json`)
        - Importer behavior (one of the `Import/*Importer.cs`)
        - Translation / key resolution (`Translation/`)
        - Build / release / packaging
        - Documentation only
    validations:
      required: true

  - type: dropdown
    id: breaking
    attributes:
      label: Is this a breaking change for the website consumer?
      description: A change that renames or removes a `keyed/*.json` field, alters a `KeyedLine` shape, or shifts `manifest.json` hashes for unrelated content is breaking.
      options:
        - "No"
        - "Possibly — needs review"
        - "Yes — coordinated bump required"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you weigh, and why is the proposal above preferred?
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links to website code that needs this, related issues, prior art from similar tools, screenshots / mock JSON, etc.
    validations:
      required: false
